name: Auto Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-version:
    name: Generate Version Number
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate Version Number
        id: version
        run: |
          VERSION_NUM=$(date -u +'%Y.%m.%d.%H%M%S')
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION_NUM"

  build-wheel:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: generate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Update pyproject.toml version
        run: |
          sed -i "s/version = \".*\"/version = \"${{ needs.generate-version.outputs.version }}\"/" pyproject.toml
          echo "Updated pyproject.toml version:"
          grep "version =" pyproject.toml

      - name: Build Wheel
        run: |
          uv build
          echo "Build artifacts:"
          ls -l dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  build-windows-binary:
    name: Build Windows Binary
    runs-on: windows-latest
    needs: generate-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies and PyInstaller
        run: uv sync --extra dev

      - name: Build Windows executable
        run: |
          uv run pyinstaller gitinsight.spec
          echo "Build artifacts:"
          dir dist\

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/gitinsight.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [generate-version, build-wheel, build-windows-binary]
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Download Windows binary artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.generate-version.outputs.version }}"
          name: "Release v${{ needs.generate-version.outputs.version }}"
          files: |
            dist/*.whl
            dist/gitinsight.exe
          make_latest: true
          body: |
            Auto-generated release from GitHub Actions.
            Version: ${{ needs.generate-version.outputs.version }}

            ## Downloads

            | File | Description |
            |------|-------------|
            | `*.whl` | Pure Python Wheel — requires Python 3.12+ |
            | `gitinsight.exe` | Windows standalone executable (no Python required) |

            ## Platform Support

            ### Python Wheel (`*-py3-none-any.whl`)
            - ✅ **Windows (x64/ARM64)**
            - ✅ **Linux (x64/ARM64)**
            - ✅ **macOS (x64/ARM64)**

            Requires Python 3.12+. Install with: `pip install gitinsight-*.whl`

            ### Windows Executable (`gitinsight.exe`)
            - ✅ **Windows (x64)**

            No Python installation required. Download and run directly.
            Usage: `gitinsight.exe <git_repo_path>`
